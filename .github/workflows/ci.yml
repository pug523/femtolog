name: ci

on:
  push:
    branches: [main]
    paths: &ci_paths
      - src/**
      - tests/**
      - third_party/**
      - .github/workflows/ci.yml
      - xmake.lua
      - CPPLINT.cfg
      - uv.lock
      - .clang-tidy
  pull_request:
    branches: [main]
    paths: *ci_paths
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            plat: linux
            arch: x86_64
            cc: clang
            cxx: clang++
            toolchain: clang
          - os: windows-2025-vs2026
            plat: windows
            arch: x64
            cc: cl
            cxx: cl
            toolchain: msvc
          - os: macos-26
            plat: macosx
            arch: arm64
            cc: clang
            cxx: clang++
            toolchain: clang
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: build and test (${{ matrix.os }})
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      XMAKE_COLORTERM: color256
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          # https://github.com/astral-sh/uv/tags
          version: "0.10.7"
          enable-cache: true

      - name: sync python dependencies with uv
        run: uv sync
        shell: bash

      - name: setup xmake
        uses: xmake-io/github-action-setup-xmake@3a1a5dddfc7fa625d9a698738334bf55655a861a
        with:
          # https://github.com/xmake-io/xmake/tags
          xmake-version: "3.0.7"
          actions-cache-folder: ".xmake-cache"
          actions-cache-key: "${{ matrix.os }}-xmake"
          package-cache: true
          package-cache-key: "${{ matrix.os }}-packages"
          build-cache: true
          build-cache-path: "build/.build_cache"
          build-cache-key: "${{ matrix.os }}-build"
          project-path: "."

      - name: configure
        shell: bash
        run: |
          xmake config -c -y \
            -m debug \
            --tests=y \
            --unitybuild=y \
            --toolchain=${{ matrix.toolchain }} \
            -p "${{ matrix.plat }}" \
            -a "${{ matrix.arch }}"

      - name: build
        shell: bash
        run: xmake build

      - name: build tests and run
        shell: bash
        run: xmake run tests

      - name: upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: "${{ matrix.os }}"
          path: out/*

      - name: analyze statically
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          xmake check api
          # xmake check clang
          # xmake analyze
          xmake lint
